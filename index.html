<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
		<link rel="stylesheet" href="./styles/main.css" />

		<title>Frontend Mentor | Blog preview card</title>
	</head>
	<body>
		<main>
			<div class="container">
				<article class="card">
					<figure class="card__content">
						<img src="./assets/images/illustration-article.svg" alt="blog card image" class="img-fluid" />

						<figcaption>
							<span>Learning</span>
							<time datetime="2023-12-21">Published 21 Dec 2023</time>
							<h1>HTML & CSS foundations</h1>
							<p>These languages are the backbone of every website, defining structure, content, and presentation.</p>
						</figcaption>
					</figure>

					<figure class="card__author">
						<img src="./assets/images/image-avatar.webp" alt="blog article author image" class="img-fluid" />
						<figcaption>Greg Hooper</figcaption>
					</figure>
				</article>
			</div>
		</main>

		<footer>
			<p>
				Challenge by
				<a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)"
					>Frontend Mentor <span class="sr-only">(opens in a new tab)</span> </a
				>. Coded by <a href="#">João Rodrigues</a>.
			</p>
		</footer>
	</body>
</html>
